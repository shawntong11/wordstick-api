<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WordStick 复习</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffde7; font-family: -apple-system, sans-serif; color: #3a2800; min-height: 100vh; }
.container { max-width: 620px; margin: 0 auto; padding: 16px; }

/* Header */
.header { display: flex; align-items: center; gap: 12px; padding: 8px 0 16px; border-bottom: 1px dashed rgba(180,150,0,0.3); margin-bottom: 16px; }
.back-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: #c8860b; padding: 4px; border-radius: 6px; }
.back-btn:hover { background: rgba(180,130,0,0.1); }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #8a7000; flex: 1; flex-wrap: wrap; }
.breadcrumb-item { cursor: pointer; }
.breadcrumb-item:hover { color: #c8860b; text-decoration: underline; }
.breadcrumb-sep { color: #c8a000; }
.title { font-family: Georgia, serif; font-size: 17px; font-weight: bold; color: #3a2800; }
.total-badge {
  margin-left: auto;
  background: rgba(180,130,0,0.12);
  border: 1px dashed rgba(180,130,0,0.35);
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 12px;
  color: #8a6500;
  white-space: nowrap;
  flex-shrink: 0;
}
.total-badge span { font-weight: 700; color: #c8860b; font-size: 14px; }

/* Directory grid */
/* Treemap container */
.dir-treemap {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 3px;
  border-radius: 10px;
  overflow: hidden;
}

.dir-card {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 10px 12px;
  border-radius: 6px;
  transition: filter 0.15s, transform 0.1s;
  overflow: hidden;
  position: relative;
  min-width: 60px;
  min-height: 60px;
  border: none;
  box-sizing: border-box;
}
.dir-card:hover { filter: brightness(1.1); transform: scale(1.02); z-index: 2; }
.dir-card:active { transform: scale(0.98); }

.dir-name {
  font-weight: 700;
  color: rgba(255,255,255,0.95);
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  line-height: 1.3;
  word-break: break-word;
  hyphens: auto;
}
.dir-count {
  font-size: 11px;
  color: rgba(255,255,255,0.75);
  margin-top: 2px;
}
.dir-pct {
  position: absolute;
  top: 8px; right: 10px;
  font-size: 10px;
  color: rgba(255,255,255,0.6);
  font-weight: 600;
}

/* All-button */
.dir-all-btn {
  width: 100%;
  padding: 10px 14px;
  border-radius: 8px;
  background: #ffd700;
  border: none;
  cursor: pointer;
  font-weight: 700;
  font-size: 14px;
  color: #3a2800;
  margin-bottom: 8px;
  text-align: left;
  font-family: inherit;
  transition: background 0.12s;
}
.dir-all-btn:hover { background: #ffca00; }

/* WordStick section */
.section-title { font-size: 12px; font-weight: 600; color: #a08000; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.ws-card {
  background: rgba(108,63,255,0.06);
  border: 1.5px solid rgba(108,63,255,0.2);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.12s;
  margin-bottom: 10px;
}
.ws-card:hover { background: rgba(108,63,255,0.12); }
.ws-card-title { font-weight: 600; font-size: 14px; color: #5a2fd0; }
.ws-card-sub { font-size: 12px; color: #8866cc; margin-top: 4px; }

/* Flashcard view */
.flashcard-view { display: none; }
.progress-wrap { margin-bottom: 12px; }
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 4px; }
.progress-track { background: rgba(180,150,0,0.15); border-radius: 3px; height: 5px; }
.progress-bar { height: 5px; background: #e0d000; border-radius: 3px; transition: width 0.3s; width: 0%; }

.card {
  background: #f5e876;
  border-radius: 12px;
  border: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 20px;
  margin-bottom: 14px;
  overflow: hidden;
}
.word-img {
  width: 100%;
  max-height: 320px;
  object-fit: contain;
  border-radius: 12px 12px 0 0;
  display: block;
  background: #1a1a2e;
}
.word-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 16px 20px 0;
  width: 100%;
  text-align: center;
}
.word-title { font-family: Georgia, serif; font-size: 40px; color: #1a1200; line-height: 1.1; }
.word-ipa { font-size: 15px; color: #8a7000; }
.word-zh { font-size: 16px; font-weight: 500; color: #2a1f00; }
.tag-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
.tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 3px; }
.cat-tag { background: rgba(180,150,0,0.18); color: #7a5c00; }
.ws-tag { background: rgba(108,63,255,0.12); color: #5a2fd0; }
.wh-tag { background: rgba(0,122,255,0.1); color: #0051b3; }

.controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.auto-row { display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 13px; color: #8a7000; flex-wrap: wrap; }
.btn { padding: 9px 18px; border-radius: 8px; border: 1.5px solid rgba(180,130,0,0.4); background: #fff9c4; color: #3a2800; font-weight: 600; font-size: 13px; cursor: pointer; box-shadow: 2px 2px 0 rgba(180,130,0,0.15); font-family: inherit; transition: all 0.12s; }
.btn:hover { background: #ffd700; transform: translate(-1px,-1px); }
.btn:active { transform: translate(1px,1px); }
.btn-know { background: #d4f5d4; border-color: rgba(52,199,89,0.4); color: #1a5c20; }
.btn-know:hover { background: #52c355; color: #fff; }
.btn-unknown { background: #ffd0cc; border-color: rgba(255,59,48,0.3); color: #8a1000; }
.btn-unknown:hover { background: #ff3b30; color: #fff; }
.num-input { width: 44px; border: 1px dashed rgba(180,150,0,0.5); border-radius: 4px; background: #fffde7; padding: 2px 4px; text-align: center; font-family: inherit; color: #3a2800; margin-left: 4px; }

.empty { text-align: center; padding: 40px 0; color: #c8a000; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <button class="back-btn" id="backBtn" title="返回上一级">←</button>
    <div class="breadcrumb" id="breadcrumb">
      <span class="title">📖 WordStick 复习</span>
    </div>
    <div class="total-badge" id="totalBadge" style="display:none">共 <span id="totalCount">—</span> 词</div>
  </div>

  <!-- Directory view -->
  <div id="dirView">
    <!-- WordStick saved words shortcut -->
    <div id="wsSection"></div>
    <!-- WordHub library tree -->
    <div id="dirGrid" class="dir-treemap"></div>
  </div>

  <!-- Flashcard view -->
  <div class="flashcard-view" id="flashView">
    <div class="progress-wrap">
      <div class="progress-labels">
        <span id="progressText">0 / 0</span>
        <span id="knownLabel"></span>
      </div>
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    </div>
    <div class="card" id="mainCard">
      <img id="wordImg" class="word-img" style="display:none" alt="">
      <div class="word-info">
        <div class="word-title" id="wordTitle"></div>
        <div class="word-ipa" id="wordIpa"></div>
        <div class="word-zh" id="wordZh"></div>
        <div class="tag-row" id="tagRow"></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="prevBtn">← 上一个</button>
      <button class="btn btn-unknown" id="unknownBtn">✗ 还不会</button>
      <button class="btn btn-know" id="knowBtn">✓ 认识</button>
      <button class="btn" id="nextBtn">下一个 →</button>
    </div>
    <div class="auto-row">
      <button class="btn" id="speakBtn">🔊 发音</button>
      <button class="btn" id="pauseBtn">⏸ 暂停</button>
      <label>播放次数<input class="num-input" id="repeatCount" type="number" min="1" max="5" value="2"></label>
      <label>间隔(秒)<input class="num-input" id="intervalSec" type="number" min="1" max="10" value="3"></label>
    </div>
  </div>

</div>
<script src="/review.js"></script>
<script>
// 等 review.js 加载完树数据后统计总词数
(function() {
  function countAllWords(node) {
    if (Array.isArray(node)) return node.length;
    return Object.values(node).reduce((s, v) => s + countAllWords(v), 0);
  }
  // 轮询等待全局树数据就绪（review.js 里加载后赋值给 window.wordTree）
  const timer = setInterval(() => {
    if (window.wordTree) {
      clearInterval(timer);
      const total = countAllWords(window.wordTree);
      document.getElementById('totalCount').textContent = total.toLocaleString('zh-CN');
      document.getElementById('totalBadge').style.display = '';
    }
  }, 200);
})();
</script>
</body>
</html>
